<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Roll</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- ─── STYLESHEETS ─────────────────────────────── -->
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<!-- ─── TOPBAR ─────────────────────────────────────── -->
<div class="topbar">
  <span class="topbar-icon">📦</span>
  <h1>FORM ROLL</h1>
</div>

<!-- ─── MAIN ──────────────────────────────────────── -->
<div class="main">
  <div class="card">

    <!-- FORM SECTIONS -->
    <div class="form-grid">

      <!-- 1. INFORMASI UMUM -->
      <div class="form-section">
        <div class="section-title">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Informasi Umum
        </div>
        <div class="field-row">
          <label>Tanggal</label>
          <div class="input-wrap"><input type="date" id="tanggal" value=""></div>
        </div>
        <div class="field-row">
          <label>Jam</label>
          <div class="input-wrap"><input type="time" id="jam" value="" step="1"></div>
        </div>
        <div class="field-row">
          <label>Roll Ke</label>
          <div class="input-wrap"><input type="number" id="roll_ke" value="" min="1"></div>
        </div>
        <div class="field-row">
          <label>Group</label>
          <div class="input-wrap">
            <select id="group">
              <option value="" selected>Pilih Group</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <label>Mesin</label>
          <div class="input-wrap">
              <input type="number" id="mesin">
          </div>
        </div>
        <div class="field-row">
          <label>Lanjut</label>
          <div class="input-wrap">
            <div class="edit-wrap">
              <input type="text" id="lanjut" value="Lanjut" disabled>
              <button class="btn-lanjut">Lanjut</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 2. DETAIL PRODUK -->
      <div class="form-section">
        <div class="section-title">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Detail Produk
        </div>
        <div class="field-row">
          <label>Nama</label>
          <div class="input-wrap"><input type="text" id="nama" value=""></div>
        </div>
        <div class="field-row">
          <label>Denier</label>
          <div class="input-wrap"><input type="number" id="denier" value=""></div>
        </div>
        <div class="field-row">
          <label>Panjang</label>
          <div class="input-wrap"><input type="number" id="panjang" value=""></div>
        </div>
        <div class="field-row">
          <label>Lebar</label>
          <div class="input-wrap"><input type="number" id="lebar" value=""></div>
        </div>
      </div>

      <!-- 3. PRODUKSI / HASIL -->
      <div class="form-section">
        <div class="section-title">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Produksi / Hasil
        </div>
        <div class="field-row">
          <label>Anyam / GSM</label>
          <div class="input-wrap"><input type="text" id="anyam" value=""></div>
        </div>
        <div class="field-row">
          <label>Berat Brutto</label>
          <div class="input-wrap"><input type="number" id="berat" value=""></div>
        </div>
        <div class="field-row">
          <label>Kode Trace</label>
          <div class="input-wrap"><input type="text" id="kode_trace" value="" class="mono-input" style="font-family:var(--font-mono);font-size:12px;"></div>
        </div>
        <div class="field-row">
          <label>Keterangan</label>
          <div class="input-wrap"><input type="text" id="keterangan" value=""></div>
        </div>
        <div class="field-row">
          <label>PIC</label>
          <div class="input-wrap"><input type="text" id="pic" value="" placeholder="Nama/Inisial PIC"></div>
        </div>
      </div>

      <!-- 4. PERIODE & TOOLS -->
      <div class="form-section periode-section">
        <div class="section-title">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Periode &amp; Tools
        </div>
        <div class="field-row">
          <label>Periode Awal</label>
          <div class="input-wrap">
            <input type="date">
          </div>
        </div>
        <div class="field-row">
          <label>Periode Akhir</label>
          <div class="input-wrap">
            <input type="date">
          </div>
        </div>
        <button class="btn-tool lihat">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          LIHAT
        </button>
        <button class="btn-tool excel">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          EXCEL
        </button>
      </div>

    </div><!-- /form-grid -->

    <!-- ACTION BAR -->
    <div class="action-bar">
      <button class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        BARU
      </button>
      <button class="btn btn-success">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        SIMPAN
      </button>
      <button class="btn btn-warning">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        EDIT
      </button>
      <button class="btn btn-danger">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        HAPUS
      </button>
      <button class="btn btn-neutral">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        KELUAR
      </button>
    </div>

  </div><!-- /card -->

  <!-- ─── DATA ROLL TABLE ──────────────────────── -->
  <div class="card">
    <div class="table-header-bar">
      <div class="table-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        Data Roll
      </div>
      <div class="show-entries">
        Show
        <select id="per_page" onchange="renderTable()">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="25">25</option>
          <option value="50">50</option>
        </select>
        entries
      </div>
      <div class="search-wrap">
        <input type="text" id="search_input" placeholder="Cari data..." oninput="renderTable()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <button class="btn-filter">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        FILTER
      </button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>No</th><th>TGL</th><th>JAM</th><th>ROLL</th><th>SHIFT</th>
            <th>MESIN</th><th>NAMA</th><th>DNR</th><th>PJ</th><th>LB</th>
            <th>ANYAM</th><th>BR</th><th>TRACE</th><th>REG</th><th>USER</th>
          </tr>
        </thead>
        <tbody id="table_body"></tbody>
      </table>
    </div>

    <div class="table-footer">
      <span id="table_info">Showing 1 to 10 of 1,250 entries</span>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div><!-- /main -->

<!-- ─── APPLICATION ENTRY POINT ──────────────────── -->
<script type="module" src="assets/js/app.js"></script>

</body>
</html>
