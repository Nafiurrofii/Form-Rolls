<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Lanjut Modern</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f172a;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .btn-lanjut{
      position:relative;
      width:220px;
      height:60px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#3b82f6,#2563eb);
      color:white;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      overflow:hidden;
      transition:all 0.35s ease;
      box-shadow:
        0 10px 25px rgba(37,99,235,0.35),
        inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .btn-lanjut:hover{
      transform:translateY(-3px) scale(1.02);
      box-shadow:
        0 18px 35px rgba(37,99,235,0.45),
        inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .btn-lanjut:active{
      transform:scale(0.98);
    }

    /* efek shine */
    .btn-lanjut::before{
      content:'';
      position:absolute;
      top:0;
      left:-120%;
      width:100%;
      height:100%;
      background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.35),
        transparent
      );
      transition:0.7s;
    }

    .btn-lanjut:hover::before{
      left:120%;
    }

    /* =========================
       ACTIVE STATE
    ========================= */

    .btn-lanjut.active{
      background:linear-gradient(135deg,#0f766e,#14b8a6);
      box-shadow:
        0 12px 30px rgba(20,184,166,0.4),
        0 0 25px rgba(20,184,166,0.35);
      padding-left:22px;
    }

    .btn-lanjut.active::after{
      content:'✓';
      position:absolute;
      left:24px;
      top:50%;
      transform:translateY(-50%);
      font-size:18px;
      animation:checkPop 0.3s ease;
    }

    @keyframes checkPop{
      from{
        opacity:0;
        transform:translateY(-50%) scale(0);
      }
      to{
        opacity:1;
        transform:translateY(-50%) scale(1);
      }
    }

  </style>
</head>
<body>

  <button class="btn-lanjut" id="btnLanjut">
    Lanjut
  </button>

  <script>

    const btn = document.getElementById('btnLanjut');

    btn.addEventListener('click', () => {

      // toggle ui active
      btn.classList.toggle('active');

      // text tetap lanjut
      btn.innerText = 'Lanjut';

    });

  </script>

</body>
</html>
